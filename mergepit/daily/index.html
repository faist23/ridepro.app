<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MergePit Daily Challenge</title>

  <!-- Link-preview metadata, so a shared challenge looks good in Messages/social. -->
  <meta property="og:title" content="MergePit Daily Challenge">
  <meta property="og:description" content="Everyone plays the same pit today. Beat your friends' scores.">
  <meta property="og:url" content="https://ridepro.app/mergepit/daily/">
  <meta property="og:type" content="website">
  <!-- Optional: host a 1200x630 preview image and point og:image at it.
  <meta property="og:image" content="https://ridepro.app/mergepit/daily-og.png"> -->
  <meta name="twitter:card" content="summary_large_image">

  <style>
    :root {
      --bg: #f5f2ee; --card: #ffffff; --text-primary: #1c1c1e;
      --text-secondary: #5c5c5e; --text-tertiary: #a0a0a2; --border: #e5e0d8; --accent: #d6336c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171717; --card: #242426; --text-primary: #f5f2ee;
        --text-secondary: #aeaeb2; --text-tertiary: #636366; --border: #38383a; --accent: #ff6fb5;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text-primary);
      font-family: ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .container { max-width: 460px; text-align: center; }
    .merge-icon { display: inline-flex; gap: 6px; margin-bottom: 22px; }
    .merge-icon span { width: 24px; height: 24px; border-radius: 50%; }
    .merge-icon span:nth-child(1) { background: #ff4d6d; }
    .merge-icon span:nth-child(2) { background: #ffd23f; }
    .merge-icon span:nth-child(3) { background: #3fa9f5; }
    .merge-icon span:nth-child(4) { background: var(--accent); }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .tagline {
      font-size: 0.95rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); margin-bottom: 28px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 30px 26px; margin-bottom: 24px;
    }
    .card p { font-size: 1.05rem; line-height: 1.6; color: var(--text-secondary); }
    .cta {
      display: inline-block; background: var(--accent); color: #fff; text-decoration: none;
      font-weight: 700; font-size: 1.05rem; padding: 14px 30px; border-radius: 999px;
    }
    .cta:hover { opacity: 0.9; }
    .note { margin-top: 18px; font-size: 0.85rem; color: var(--text-tertiary); }
    footer { margin-top: 40px; font-size: 0.8rem; color: var(--text-tertiary); }
    footer a { color: var(--text-tertiary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="merge-icon"><span></span><span></span><span></span><span></span></div>
    <h1>MergePit Daily</h1>
    <p class="tagline">Same pit · every day</p>

    <div class="card">
      <p>Today's pit is the same for everyone. Drop, merge, and chase the top of
      the daily leaderboard — then dare a friend to beat your score.</p>
    </div>

    <!-- TODO: swap href for the App Store URL once the app is live. -->
    <a class="cta" href="#">Get MergePit</a>
    <p class="note">Already have the app? This link opens today's challenge.</p>

    <footer>
      © 2026 RidePro &nbsp;·&nbsp;
      <a href="/mergepit/support.html">Support</a> &nbsp;·&nbsp;
      <a href="/mergepit/privacy.html">Privacy</a>
    </footer>
  </div>
</body>
</html>
